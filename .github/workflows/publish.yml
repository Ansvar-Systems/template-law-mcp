name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:contract

      - uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ─────────────────────────────────────────────────────────────────────
      # DATABASE ARTIFACT
      # ─────────────────────────────────────────────────────────────────────
      # Build DB from seeds, compress, and upload to GitHub Release.
      # Downstream Docker/Vercel builds download this instead of
      # re-running slow government API ingestion.
      # ─────────────────────────────────────────────────────────────────────

      - name: Build database from seeds
        run: npm run build:db

      - name: Compress database
        run: gzip -k data/database.db

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom.cdx.json
            data/database.db.gz
          append_body: true
          body: |
            ### Artifacts
            - `database.db.gz` — Pre-built SQLite database (download for Docker builds)
            - `sbom.cdx.json` — CycloneDX SBOM
