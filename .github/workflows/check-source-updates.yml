name: Check Source Updates

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Check for upstream changes
        run: npx tsx scripts/check-source-updates.ts
        id: check

      - name: Create update issue
        if: steps.check.outputs.updates_available == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Source data update available — ${{ steps.check.outputs.update_summary }}`,
              body: `Automated check detected upstream changes.\n\n${{ steps.check.outputs.update_details }}`,
              labels: ['data-update', 'automated']
            });
